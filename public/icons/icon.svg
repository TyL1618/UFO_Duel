<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0a0a1a"/>

  <!-- Glow backdrop -->
  <ellipse cx="256" cy="280" rx="160" ry="40" fill="#00d4ff" opacity="0.12"/>

  <!-- UFO body (ellipse) -->
  <ellipse cx="256" cy="285" rx="140" ry="42" fill="#0a2a4a" stroke="#00d4ff" stroke-width="4"/>

  <!-- UFO dome -->
  <path d="M 180 285 A 76 60 0 0 1 332 285 Z" fill="#0a1a3a" stroke="#00d4ff" stroke-width="3"/>

  <!-- Dome highlight -->
  <ellipse cx="256" cy="272" rx="40" ry="18" fill="#00d4ff" opacity="0.2"/>

  <!-- Underside lights -->
  <circle cx="196" cy="296" r="8" fill="#ffdd00" opacity="0.9"/>
  <circle cx="236" cy="304" r="8" fill="#00ff88" opacity="0.9"/>
  <circle cx="276" cy="304" r="8" fill="#00ff88" opacity="0.9"/>
  <circle cx="316" cy="296" r="8" fill="#ffdd00" opacity="0.9"/>

  <!-- Beam down -->
  <polygon points="220,310 292,310 310,400 202,400" fill="#00d4ff" opacity="0.08"/>

  <!-- Second UFO (enemy, smaller, top-right) -->
  <ellipse cx="380" cy="155" rx="72" ry="22" fill="#1a0a2a" stroke="#ff3366" stroke-width="3"/>
  <path d="M 340 155 A 40 32 0 0 1 420 155 Z" fill="#0a0a1a" stroke="#ff3366" stroke-width="2"/>
  <circle cx="356" cy="163" r="5" fill="#ff3366" opacity="0.9"/>
  <circle cx="380" cy="167" r="5" fill="#ff3366" opacity="0.9"/>
  <circle cx="404" cy="163" r="5" fill="#ff3366" opacity="0.9"/>

  <!-- Bullet trail between UFOs -->
  <line x1="310" y1="200" x2="380" y2="155" stroke="#ffdd00" stroke-width="3" stroke-dasharray="8 6" opacity="0.7"/>
  <circle cx="310" cy="200" r="5" fill="#ffdd00"/>
</svg>
